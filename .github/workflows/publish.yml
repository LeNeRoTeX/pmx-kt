name: publish

on:
  push:
    # Every push to main publishes a 0.1.0-SNAPSHOT (overwriteable per Maven SNAPSHOT semantics).
    branches: [main]
    # Tag pushes publish a real release at that version, e.g. v0.1.0 -> 0.1.0.
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g. 0.1.0). Leave blank to use the build default (0.1.0-SNAPSHOT)."
        required: false
        default: ""

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: build, test & publish to GitHub Packages
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            # Tag form: refs/tags/v0.1.0 -> 0.1.0
            v="${GITHUB_REF_NAME#v}"
            kind="release"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            v="${{ github.event.inputs.version }}"
            kind="manual"
          else
            # Push to main -> let Gradle fall back to 0.1.0-SNAPSHOT (see build.gradle.kts).
            v=""
            kind="snapshot"
          fi
          echo "version=$v"     >> "$GITHUB_OUTPUT"
          echo "kind=$kind"     >> "$GITHUB_OUTPUT"
          echo "Publishing kind=$kind version=${v:-<gradle-default>}"

      - name: Build, test, publish
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          chmod +x ./gradlew
          # An empty -Pversion is filtered by build.gradle.kts (`takeIf { it.isNotBlank() }`)
          # and falls back to 0.1.0-SNAPSHOT, so this single command works for all triggers.
          ./gradlew \
            -Pversion="${{ steps.ver.outputs.version }}" \
            build publish --stacktrace

      - name: Upload jar artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pmx-kt-${{ steps.ver.outputs.kind }}-${{ github.run_number }}
          path: |
            build/libs/*.jar
          if-no-files-found: error
          retention-days: 30
